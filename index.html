/* =========================================================================
   Gestiofincas — Colors & Type
   La inmobiliaria de Cambrils · Costa Daurada
   ------------------------------------------------------------------------- */

/* ---------- Webfonts ----------------------------------------------------- */
@import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&display=swap");

:root {
  /* ---------- Brand color ----------
     Mint sampled directly from the GF arch mark (avg rgb 78,153,138). */
  --mint-900: #1c3c34;
  --mint-800: #2a564a;
  --mint-700: #38705f;
  --mint-600: #4e998a;   /* PRIMARY — the brand mint */
  --mint-500: #6db1a3;
  --mint-400: #94c7bc;
  --mint-300: #b8d9d2;
  --mint-200: #d4e6e2;
  --mint-100: #e8f1ef;
  --mint-50:  #f3f8f6;

  /* ---------- Neutrals (warm, paper-like) ----------
     The serif logos read as classical / editorial. We tint the neutrals
     with a hint of warmth so the page feels like premium catalogue paper
     rather than dashboard grey. */
  --ink-900: #14110f;    /* near-black, body text on light */
  --ink-800: #2a2520;
  --ink-700: #4a423a;    /* secondary text */
  --ink-600: #6b6158;
  --ink-500: #8b8278;    /* tertiary text, captions */
  --ink-400: #b3aba2;
  --ink-300: #d4cec6;    /* hairlines */
  --ink-200: #e6e1da;    /* dividers, very subtle borders */
  --ink-100: #f1ede6;    /* sand, subtle surface */
  --ink-50:  #f8f5ef;    /* cream, page tint */
  --paper:   #fbf9f4;    /* PAGE BG — warm off-white */
  --white:   #ffffff;

  /* ---------- Semantic ---------- */
  --success: #4e998a;
  --warning: #c89a3a;
  --danger:  #b04a3a;
  --info:    #4a7a99;

  /* ---------- Surfaces ---------- */
  --bg:           var(--paper);
  --bg-elevated:  var(--white);
  --bg-sunken:    var(--ink-100);
  --bg-inverse:   var(--ink-900);

  /* ---------- Foreground (semantic) ---------- */
  --fg-1: var(--ink-900);   /* primary text */
  --fg-2: var(--ink-700);   /* secondary text, body */
  --fg-3: var(--ink-500);   /* tertiary, captions, meta */
  --fg-mute: var(--ink-400);
  --fg-on-mint: var(--white);
  --fg-on-dark: var(--paper);

  /* ---------- Borders ---------- */
  --border-1: var(--ink-200);   /* default */
  --border-2: var(--ink-300);   /* prominent */
  --border-strong: var(--ink-700);

  /* ---------- Accent ---------- */
  --accent:        var(--mint-600);
  --accent-hover:  var(--mint-700);
  --accent-press:  var(--mint-800);
  --accent-soft:   var(--mint-100);

  /* ---------- Type families ----------
     Display: Cormorant Garamond — high-contrast didone-leaning serif.
       Closest free Google Font to the bespoke wordmark. The logo's
       distinctive double-loop "g" is preserved in italic 500.
     Body / UI: Inter — neutral, legible, modern.
     The all-caps tagline ("LA INMOBILIARIA DE CAMBRILS") uses Inter
       at 500 with wide letter-spacing. */
  --font-display: "Cormorant Garamond", "Cormorant", Georgia, "Times New Roman", serif;
  --font-body:    "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-mono:    ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  /* ---------- Type scale (modular ~1.25) ---------- */
  --fs-12: 0.75rem;     /* 12 — micro, tags */
  --fs-13: 0.8125rem;   /* 13 — meta, labels caps */
  --fs-14: 0.875rem;    /* 14 — UI small */
  --fs-16: 1rem;        /* 16 — body */
  --fs-18: 1.125rem;    /* 18 — body large, lead */
  --fs-20: 1.25rem;
  --fs-24: 1.5rem;      /* h4 */
  --fs-32: 2rem;        /* h3 */
  --fs-44: 2.75rem;     /* h2 */
  --fs-60: 3.75rem;     /* h1 */
  --fs-84: 5.25rem;     /* hero display */

  --lh-tight: 1.05;
  --lh-snug:  1.2;
  --lh-body:  1.55;
  --lh-loose: 1.75;

  /* Tracking — serif display tightens slightly, caps eyebrows track wide. */
  --tr-tight: -0.02em;
  --tr-normal: 0;
  --tr-wide:   0.08em;
  --tr-caps:   0.18em;

  /* ---------- Spacing (4px base) ---------- */
  --sp-1:  0.25rem;
  --sp-2:  0.5rem;
  --sp-3:  0.75rem;
  --sp-4:  1rem;
  --sp-5:  1.25rem;
  --sp-6:  1.5rem;
  --sp-8:  2rem;
  --sp-10: 2.5rem;
  --sp-12: 3rem;
  --sp-16: 4rem;
  --sp-20: 5rem;
  --sp-24: 6rem;

  /* ---------- Radii ----------
     The brand uses a rounded-arch shape on the mark. We mirror that with
     fully rounded tops on featured cards (--radius-arch) and a generally
     SMALL corner radius elsewhere — the editorial brand reads cleaner
     with crisp corners than chunky pill shapes. */
  --radius-xs:   2px;
  --radius-sm:   4px;
  --radius-md:   8px;
  --radius-lg:   12px;
  --radius-pill: 999px;
  --radius-arch: 50% 50% 4px 4px / 30% 30% 4px 4px;  /* arched top, square bottom */

  /* ---------- Elevation ----------
     Soft, low-contrast shadows. We avoid drop-shadowy "card" looks; this
     brand is editorial / catalogue-like. */
  --shadow-1: 0 1px 2px rgba(20, 17, 15, 0.04), 0 1px 1px rgba(20, 17, 15, 0.03);
  --shadow-2: 0 2px 8px rgba(20, 17, 15, 0.05), 0 1px 2px rgba(20, 17, 15, 0.04);
  --shadow-3: 0 8px 24px rgba(20, 17, 15, 0.08), 0 2px 6px rgba(20, 17, 15, 0.05);
  --shadow-4: 0 24px 48px rgba(20, 17, 15, 0.12), 0 6px 12px rgba(20, 17, 15, 0.06);
  --shadow-inset: inset 0 0 0 1px var(--border-1);

  /* ---------- Motion ---------- */
  --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --dur-1: 120ms;
  --dur-2: 240ms;
  --dur-3: 400ms;
  --dur-4: 700ms;
}

/* ===========================================================================
   Semantic typography classes
   =========================================================================== */

html { color: var(--fg-1); background: var(--bg); }
body { font-family: var(--font-body); font-size: var(--fs-16); line-height: var(--lh-body); color: var(--fg-2); -webkit-font-smoothing: antialiased; }

/* Display (serif) */
.display-hero,
h1.display {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: clamp(3rem, 6vw + 1rem, var(--fs-84));
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-tight);
  color: var(--fg-1);
  text-wrap: balance;
}

h1, .h1 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: clamp(2.25rem, 3.5vw + 1rem, var(--fs-60));
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-tight);
  color: var(--fg-1);
  text-wrap: balance;
}
h2, .h2 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: clamp(1.75rem, 2vw + 1rem, var(--fs-44));
  line-height: var(--lh-snug);
  letter-spacing: var(--tr-tight);
  color: var(--fg-1);
  text-wrap: balance;
}
h3, .h3 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: var(--fs-32);
  line-height: var(--lh-snug);
  color: var(--fg-1);
}
h4, .h4 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: var(--fs-24);
  line-height: var(--lh-snug);
  color: var(--fg-1);
}

/* Italic display — the wordmark’s signature style */
.display-italic {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 500;
}

/* Eyebrow / caps label — matches the "LA INMOBILIARIA DE CAMBRILS" tag
   under the wordmark. Always tracked-out, always uppercase. */
.eyebrow {
  font-family: var(--font-body);
  font-size: var(--fs-13);
  font-weight: 500;
  letter-spacing: var(--tr-caps);
  text-transform: uppercase;
  color: var(--accent);
}
.eyebrow--ink { color: var(--fg-3); }

/* Body */
.lead {
  font-family: var(--font-body);
  font-size: var(--fs-18);
  line-height: var(--lh-body);
  color: var(--fg-2);
  text-wrap: pretty;
}
p, .body { font-size: var(--fs-16); line-height: var(--lh-body); color: var(--fg-2); text-wrap: pretty; }
.body-sm { font-size: var(--fs-14); line-height: var(--lh-body); color: var(--fg-2); }
.caption  { font-size: var(--fs-13); line-height: var(--lh-body); color: var(--fg-3); }

/* Numerals — tabular for prices */
.price {
  font-family: var(--font-display);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  letter-spacing: var(--tr-tight);
  color: var(--fg-1);
}


    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

/* ============================ CTA Band ============================ */
function CtaBand({ t, onNav }) {
  return (
    <section style={{ background: 'var(--ink-900)', color: 'var(--paper)', padding: '120px 48px', position: 'relative', overflow: 'hidden' }}>
      <div style={{ position: 'absolute', right: -80, top: -40, width: 360, height: 460, background: 'var(--mint-700)', borderRadius: '50% 50% 4px 4px / 30% 30% 4px 4px', opacity: 0.18, pointerEvents: 'none' }} />
      <div style={{ maxWidth: 1080, margin: '0 auto', position: 'relative', display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: 64, alignItems: 'end' }}>
        <div>
          <div style={{ fontFamily: 'var(--font-body)', fontSize: 13, fontWeight: 500, letterSpacing: 'var(--tr-caps)', textTransform: 'uppercase', color: 'var(--mint-400)', marginBottom: 16 }}>{t.cta.eyebrow}</div>
          <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 'clamp(36px, 5vw, 64px)', fontWeight: 400, margin: 0, color: 'var(--paper)', letterSpacing: '-0.02em', lineHeight: 1.05 }}>
            {t.cta.title[0]} <span style={{ fontStyle: 'italic', fontWeight: 500 }}>{t.cta.title[1]}</span>
          </h2>
        </div>
        <div>
          <p style={{ fontSize: 16, lineHeight: 1.65, color: 'var(--paper)', opacity: 0.78, margin: '0 0 24px', maxWidth: 420 }}>{t.cta.body}</p>
          <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
            <button onClick={() => onNav('sell')} style={{ padding: '14px 22px', background: 'var(--mint-600)', color: 'var(--white)', border: 0, borderRadius: 4, fontFamily: 'var(--font-body)', fontSize: 14, fontWeight: 500, letterSpacing: 'var(--tr-wide)', textTransform: 'uppercase', cursor: 'pointer', transition: 'background 120ms' }} onMouseEnter={e => e.currentTarget.style.background = 'var(--mint-700)'} onMouseLeave={e => e.currentTarget.style.background = 'var(--mint-600)'}>{t.cta.btnA}</button>
            <button onClick={() => onNav('buy')} style={{ padding: '14px 22px', background: 'transparent', color: 'var(--paper)', border: '1px solid rgba(255,255,255,0.4)', borderRadius: 4, fontFamily: 'var(--font-body)', fontSize: 14, fontWeight: 500, letterSpacing: 'var(--tr-wide)', textTransform: 'uppercase', cursor: 'pointer', transition: 'border-color 120ms' }} onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--paper)'} onMouseLeave={e => e.currentTarget.style.borderColor = 'rgba(255,255,255,0.4)'}>{t.cta.btnB}</button>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ============================ Footer ============================ */
function Footer({ t, lang, onLang, onNav }) {
  const [email, setEmail] = useState('');
  const [subscribed, setSubscribed] = useState(false);
  return (
    <footer style={{ background: 'var(--ink-900)', color: 'var(--paper)', padding: '88px 48px 32px' }}>
      <div style={{ maxWidth: 1280, margin: '0 auto' }}>
        {/* Newsletter strip */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 64, alignItems: 'center', paddingBottom: 64, marginBottom: 64, borderBottom: '1px solid rgba(255,255,255,0.12)' }}>
          <div>
            <div style={{ fontFamily: 'var(--font-body)', fontSize: 12, fontWeight: 500, letterSpacing: 'var(--tr-caps)', textTransform: 'uppercase', color: 'var(--mint-400)', marginBottom: 12 }}>{t.footer.newsletterTitle}</div>
            <h3 style={{ fontFamily: 'var(--font-display)', fontSize: 32, fontWeight: 400, margin: 0, color: 'var(--paper)', letterSpacing: '-0.01em', lineHeight: 1.15 }}>
              {t.footer.newsletterBody.split('. ')[0]}.

          </div>
          <form onSubmit={(e) => { e.preventDefault(); if (email) setSubscribed(true); }} style={{ display: 'flex', gap: 8, alignItems: 'stretch', height: 52 }}>

              <>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder={t.footer.newsletterPh} required style={{ flex: 1, background: 'transparent', border: '1px solid rgba(255,255,255,0.25)', color: 'var(--paper)', padding: '0 18px', fontFamily: 'var(--font-body)', fontSize: 15, borderRadius: 4, outline: 'none' }} />
                <button type="submit" style={{ padding: '0 28px', background: 'var(--mint-600)', color: 'var(--white)', border: 0, borderRadius: 4, fontFamily: 'var(--font-body)', fontSize: 13, fontWeight: 500, letterSpacing: 'var(--tr-wide)', textTransform: 'uppercase', cursor: 'pointer', transition: 'background 120ms', whiteSpace: 'nowrap' }} onMouseEnter={e => e.currentTarget.style.background = 'var(--mint-700)'} onMouseLeave={e => e.currentTarget.style.background = 'var(--mint-600)'}>{t.footer.newsletterCta}</button>

  <script type="text/babel">
// pieces.jsx — ListingCard, SearchBar, Pillars, Testimonial, Mark
const { useState: useStateP, useMemo: useMemoP } = React;

/* ============================ Listing Card ============================ */
function ListingCard({ listing, lang, t, featured = false, onClick, compact = false }) {
  const [hover, setHover] = useStateP(false);
  const [fav, setFav] = useStateP(false);
  const title = listing.title[lang] || listing.title.cat;
  const loc = listing.location[lang] || listing.location.cat;
  const badge = listing.badge ? (listing.badge[lang] || listing.badge.cat) : null;
  return (
    <article
      onClick={() => onClick && onClick(listing)}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        background: 'var(--white)',
        border: '1px solid ' + (hover ? 'var(--mint-400)' : 'var(--border-1)'),
        borderRadius: featured ? '60px 60px 8px 8px / 36px 36px 8px 8px' : '8px',
        overflow: 'hidden', cursor: 'pointer',
        display: 'flex', flexDirection: 'column',
        transition: 'border-color 240ms',
      }}
    >
      <div style={{ position: 'relative', aspectRatio: compact ? '4 / 3' : '4 / 3', overflow: 'hidden', flex: 'none' }}>
        <img src={listing.image} alt={title} style={{ width: '100%', height: '100%', objectFit: 'cover', transition: 'transform 700ms cubic-bezier(0.22,1,0.36,1)', transform: hover ? 'scale(1.05)' : 'scale(1)' }} />
        {badge && (
          <span style={{ position: 'absolute', top: 14, left: 14, background: 'var(--white)', color: 'var(--ink-900)', padding: '4px 10px', borderRadius: 999, fontFamily: 'var(--font-body)', fontSize: 11, fontWeight: 500, letterSpacing: 'var(--tr-wide)', textTransform: 'uppercase' }}>{badge}</span>
        )}
        <button onClick={(e) => { e.stopPropagation(); setFav(f => !f); }} aria-label="favourite" style={{ position: 'absolute', top: 12, right: 12, width: 36, height: 36, borderRadius: 999, border: 0, background: 'rgba(251,249,244,0.92)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: fav ? 'var(--mint-700)' : 'var(--ink-700)' }}>
          <Icon name="heart" size={16} stroke={fav ? 0 : 1.6} style={{ fill: fav ? 'currentColor' : 'none' }} />
        </button>
      </div>
      <div style={{ padding: '18px 20px 22px', display: 'flex', flexDirection: 'column', gap: 6 }}>
        <div style={{ fontFamily: 'var(--font-body)', fontSize: 11, fontWeight: 500, letterSpacing: 'var(--tr-caps)', textTransform: 'uppercase', color: 'var(--mint-700)' }}>{loc}</div>
        <h3 style={{ fontFamily: 'var(--font-display)', fontSize: 22, fontWeight: 500, color: 'var(--ink-900)', margin: 0, lineHeight: 1.2 }}>{title}</h3>
        <div style={{ fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--fg-3)', display: 'flex', gap: 10, flexWrap: 'wrap', marginTop: 4, alignItems: 'center' }}>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}><Icon name="move" size={14}/> {listing.area} m²</span>
          {listing.beds > 0 && <><span style={{ opacity: 0.4 }}>·</span><span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}><Icon name="bed" size={14}/> {listing.beds} {t.listing.beds}</span></>}
          {listing.baths > 0 && <><span style={{ opacity: 0.4 }}>·</span><span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}><Icon name="bath" size={14}/> {listing.baths} {t.listing.baths}</span></>}

function Field({ label, value, onChange, type = 'text', required, multiline, colSpan = 1 }) {

      {multiline ? (
        <textarea value={value} onChange={e => onChange(e.target.value)} required={required} rows={4} style={inputStyle} />

        <input type={type} value={value} onChange={e => onChange(e.target.value)} required={required} style={inputStyle} />
      )}
    </label>
  );
}
function FieldSelect({ label, options, value, onChange, colSpan = 1 }) {
  return (
    <label style={{ display: 'flex', flexDirection: 'column', gap: 6, gridColumn: `span ${colSpan}` }}>

        {options.map(o => <option key={o}>{o}</option>)}
      </select>
    </label>
  );
}

              <div style={{ borderTop: '1px solid var(--border-1)', paddingTop: 14, marginTop: 4, display: 'flex', flexDirection: 'column', gap: 6, fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--fg-2)' }}>

}
const btnSecondary = { padding: '11px 14px', background: 'transparent', color: 'var(--ink-900)', border: '1px solid var(--border-2)', borderRadius: 4, fontFamily: 'var(--font-body)', fontSize: 13, fontWeight: 500, cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6 };
const btnIconSm = { width: 36, height: 36, borderRadius: 4, border: '1px solid var(--border-1)', background: 'var(--paper)', color: 'var(--ink-700)', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' };

Object.assign(window, { HomePage, BuyPage, RentPage, SellPage, AboutPage, ContactPage, PropertyDetail });

  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [lang, setLang] = useState(() => localStorage.getItem('gf_lang') || 'cat');
      const [route, setRoute] = useState('home');
      const [detail, setDetail] = useState(null);
      const [tick, setTick] = useState(0);

      useEffect(() => { localStorage.setItem('gf_lang', lang); }, [lang]);
      useEffect(() => { window.scrollTo({ top: 0, behavior: 'instant' }); setTick(t => t + 1); }, [route, detail]);

      const t = window.I18N[lang] || window.I18N.cat;

      const nav = (r) => {
        if (r === 'buy-rent') { setDetail(null); setRoute('rent'); return; }
        setDetail(null);
        setRoute(r);
      };
      const openDetail = (l) => { setDetail(l); };

      let page;
      if (detail) {
        page = <PropertyDetail listing={detail} t={t} lang={lang} onBack={() => setDetail(null)} onCardClick={openDetail} />;
      } else if (route === 'home') {
        page = <HomePage t={t} lang={lang} onCardClick={openDetail} onNav={nav} />;
      } else if (route === 'buy') {
        page = <BuyPage t={t} lang={lang} onCardClick={openDetail} op="buy" />;
      } else if (route === 'rent') {
        page = <RentPage t={t} lang={lang} onCardClick={openDetail} onNav={nav} />;
      } else if (route === 'sell') {
        page = <SellPage t={t} lang={lang} onNav={nav} />;
      } else if (route === 'about') {
        page = <AboutPage t={t} lang={lang} onNav={nav} />;
      } else if (route === 'contact') {
        page = <ContactPage t={t} lang={lang} />;
      }

      return (
        <>
          <Header lang={lang} onLang={setLang} t={t} route={detail ? 'buy' : route} onNav={nav} />
          <main key={tick} className="gf-route-enter">{page}</main>
          <Footer t={t} lang={lang} onLang={setLang} onNav={nav} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
